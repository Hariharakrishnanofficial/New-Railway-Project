<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Railway AI Assistant Widget</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --font: "Space Grotesk", system-ui, sans-serif;
        --bg: #0a0d14;
        --surface: #111827;
        --raised: #1a2235;
        --border: #1e2433;
        --blue: #2e5fb3;
        --green: #16a34a;
        --red: #dc2626;
        --text: #f9fafb;
        --muted: #9ca3af;
        --faint: #6b7280;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: var(--font);
        color: var(--text);
        background: radial-gradient(circle at top, #1b2442 0%, #0b0f18 55%, #070a12 100%);
      }

      .demo-shell {
        display: grid;
        place-items: center;
        min-height: 100vh;
        padding: 32px;
      }

      .demo-card {
        max-width: 560px;
        background: rgba(17, 24, 39, 0.7);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 28px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(12px);
      }

      .demo-card h1 {
        margin: 0 0 12px;
        font-size: 28px;
      }

      .demo-card p {
        margin: 0;
        color: var(--muted);
        line-height: 1.6;
      }

      .chat-toggle {
        position: fixed;
        bottom: 24px;
        right: 24px;
        z-index: 9999;
        width: 56px;
        height: 56px;
        border-radius: 50%;
        border: none;
        cursor: pointer;
        background: var(--blue);
        box-shadow: 0 4px 20px rgba(46, 95, 179, 0.6);
        display: grid;
        place-items: center;
        transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      }

      .chat-toggle:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 24px rgba(46, 95, 179, 0.75);
      }

      .chat-toggle-icon {
        font-size: 24px;
      }

      .chat-unread {
        position: absolute;
        top: -2px;
        right: -2px;
        min-width: 18px;
        height: 18px;
        padding: 0 4px;
        border-radius: 999px;
        background: #ef4444;
        border: 2px solid #0a0d14;
        color: #fff;
        font-size: 10px;
        font-weight: 700;
        display: none;
        align-items: center;
        justify-content: center;
        animation: chatPulse 1.5s ease-in-out infinite;
      }

      .chat-panel {
        position: fixed;
        bottom: 90px;
        right: 24px;
        z-index: 9998;
        width: 390px;
        height: 560px;
        border-radius: 16px;
        background: var(--surface);
        border: 1px solid var(--border);
        box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        animation: chatSlideUp 0.22s ease;
      }

      .chat-header {
        padding: 12px 16px;
        background: var(--blue);
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .chat-avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.15);
        display: grid;
        place-items: center;
        font-size: 18px;
      }

      .chat-meta {
        flex: 1;
        min-width: 0;
      }

      .chat-title {
        color: #fff;
        font-weight: 700;
        font-size: 14px;
      }

      .chat-status {
        color: rgba(255, 255, 255, 0.7);
        font-size: 10px;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .chat-status-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #4ade80;
      }

      .chat-clear {
        border: none;
        background: rgba(255, 255, 255, 0.1);
        color: rgba(255, 255, 255, 0.7);
        cursor: pointer;
        padding: 5px 9px;
        border-radius: 6px;
        font-size: 11px;
        transition: background 0.15s;
      }

      .chat-clear:hover {
        background: rgba(255, 255, 255, 0.2);
      }

      .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 14px 14px 6px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        scrollbar-width: thin;
        scrollbar-color: var(--border) transparent;
      }

      .chat-bubble {
        display: flex;
        flex-direction: column;
        gap: 3px;
      }

      .chat-bubble-inner {
        position: relative;
        max-width: 83%;
      }

      .chat-bubble-body {
        padding: 9px 13px;
        line-height: 1.55;
        border-radius: 14px;
        font-size: 13px;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .chat-bubble-body.user {
        background: var(--blue);
        border: 1px solid var(--blue);
        color: var(--text);
        border-bottom-right-radius: 4px;
        box-shadow: 0 2px 12px rgba(46, 95, 179, 0.3);
      }

      .chat-bubble-body.assistant {
        background: var(--raised);
        border: 1px solid var(--border);
        border-bottom-left-radius: 4px;
      }

      .chat-bubble-body.error {
        background: #2a0f0f;
        border: 1px solid rgba(239, 68, 68, 0.25);
        color: #f87171;
        border-bottom-left-radius: 4px;
      }

      .chat-bubble-meta {
        font-size: 10px;
        color: var(--faint);
        padding: 0 4px;
      }

      .chat-bubble-copy {
        position: absolute;
        top: -8px;
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: var(--raised);
        border: 1px solid var(--border);
        color: var(--muted);
        cursor: pointer;
        font-size: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transition: opacity 0.15s;
      }

      .chat-bubble-inner:hover .chat-bubble-copy {
        opacity: 1;
      }

      .chat-bubble-copy.copied {
        color: var(--green);
      }

      .chat-typing {
        display: flex;
        gap: 5px;
        padding: 10px 14px;
        border-radius: 14px;
        border-bottom-left-radius: 4px;
        background: var(--raised);
        border: 1px solid var(--border);
        width: fit-content;
        align-items: center;
      }

      .chat-typing span {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--muted);
        display: inline-block;
        animation: chatBounce 1.2s ease-in-out infinite;
      }

      .chat-typing span:nth-child(2) {
        animation-delay: 0.22s;
      }

      .chat-typing span:nth-child(3) {
        animation-delay: 0.44s;
      }

      .chat-quick {
        padding: 8px 14px;
        display: none;
        gap: 6px;
        flex-wrap: wrap;
        border-top: 1px solid var(--border);
      }

      .chat-quick.visible {
        display: flex;
      }

      .chat-chip {
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 11px;
        background: var(--raised);
        border: 1px solid var(--border);
        color: var(--muted);
        cursor: pointer;
        transition: all 0.15s;
      }

      .chat-chip:hover {
        background: var(--blue);
        color: #fff;
        border-color: var(--blue);
      }

      .chat-input {
        padding: 10px 14px;
        border-top: 1px solid var(--border);
        display: flex;
        gap: 8px;
        align-items: flex-end;
      }

      .chat-input textarea {
        flex: 1;
        padding: 8px 12px;
        border-radius: 8px;
        background: var(--bg);
        border: 1px solid var(--border);
        color: var(--text);
        font-size: 13px;
        font-family: var(--font);
        outline: none;
        resize: none;
        line-height: 1.5;
        max-height: 90px;
        overflow-y: auto;
        transition: border-color 0.15s;
      }

      .chat-input textarea:focus {
        border-color: var(--blue);
      }

      .chat-input button {
        width: 40px;
        height: 40px;
        border-radius: 10px;
        border: none;
        background: var(--blue);
        color: #fff;
        cursor: pointer;
        display: grid;
        place-items: center;
        font-size: 18px;
        transition: all 0.15s;
      }

      .chat-input button:disabled {
        background: #1e2433;
        color: #374151;
        cursor: default;
        box-shadow: none;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        border: 0;
      }

      @media (max-width: 640px) {
        .chat-panel {
          bottom: 0;
          right: 0;
          left: 0;
          width: 100%;
          height: 100dvh;
          border-radius: 0;
        }
      }

      @keyframes chatBounce {
        0%,
        80%,
        100% {
          transform: translateY(0);
          opacity: 0.4;
        }
        40% {
          transform: translateY(-6px);
          opacity: 1;
        }
      }

      @keyframes chatSlideUp {
        from {
          opacity: 0;
          transform: translateY(20px) scale(0.96);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      @keyframes chatPulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.15);
        }
      }
    </style>
  </head>
  <body>
    <main class="demo-shell">
      <section class="demo-card">
        <h1>Railway AI Assistant</h1>
        <p>
          This page hosts the floating AI chat widget. Use the button in the
          bottom-right corner or press <strong>Ctrl+/</strong> to toggle it.
        </p>
      </section>
    </main>

    <button
      id="chat-toggle"
      class="chat-toggle"
      title="AI Assistant (Ctrl+/)"
      aria-label="Open AI Assistant"
      aria-expanded="false"
      aria-controls="ai-chat-panel"
    >
      <span class="chat-toggle-icon">🤖</span>
      <span id="chat-unread" class="chat-unread" aria-hidden="true"></span>
    </button>

    <section
      id="ai-chat-panel"
      class="chat-panel"
      role="dialog"
      aria-label="Railway AI Assistant"
      aria-modal="false"
      hidden
    >
      <header class="chat-header">
        <div class="chat-avatar">🚂</div>
        <div class="chat-meta">
          <div class="chat-title">Railway AI Assistant</div>
          <div class="chat-status">
            <span class="chat-status-dot"></span>
            Online · Powered by Qwen
          </div>
        </div>
        <button id="chat-clear" class="chat-clear" type="button">↺ Clear</button>
      </header>

      <div class="chat-messages" id="chat-messages" role="log" aria-live="polite"></div>

      <div class="chat-quick" id="chat-quick"></div>

      <form class="chat-input" id="chat-form">
        <label class="sr-only" for="chat-input">Type your message</label>
        <textarea
          id="chat-input"
          rows="1"
          placeholder="Ask me anything about trains… (Enter to send)"
        ></textarea>
        <button id="chat-send" type="submit" aria-label="Send message">
          ➤
        </button>
      </form>
      <p id="chat-hint" class="sr-only">Press Enter to send, Shift+Enter for new line</p>
    </section>

    <script>
      const QUICK_ACTIONS = [
        { icon: '🎫', label: 'Book train' },
        { icon: '🚂', label: 'Search trains' },
        { icon: '📋', label: 'Check PNR' },
        { icon: '❌', label: 'Cancel booking' }
      ];

      const INITIAL_MESSAGE = {
        role: 'assistant',
        content:
          "Hello! I'm your Railway AI Assistant 🚂\n" +
          'I can search trains, check PNR, help with bookings and cancellations. How can I help you today?',
        time: new Date()
      };

      const state = {
        open: false,
        messages: [INITIAL_MESSAGE],
        loading: false,
        unread: 0,
        bookingState: null
      };

      const elements = {
        toggle: document.getElementById('chat-toggle'),
        panel: document.getElementById('ai-chat-panel'),
        messages: document.getElementById('chat-messages'),
        quick: document.getElementById('chat-quick'),
        form: document.getElementById('chat-form'),
        input: document.getElementById('chat-input'),
        send: document.getElementById('chat-send'),
        clear: document.getElementById('chat-clear'),
        unread: document.getElementById('chat-unread')
      };

      function formatTime(date) {
        return date instanceof Date
          ? date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
          : '';
      }

      function scrollToBottom() {
        elements.messages.scrollTop = elements.messages.scrollHeight;
      }

      function updateToggle() {
        elements.toggle.setAttribute('aria-expanded', state.open ? 'true' : 'false');
        elements.toggle.style.background = state.open ? '#374151' : 'var(--blue)';
        elements.toggle.querySelector('.chat-toggle-icon').textContent = state.open ? '✕' : '🤖';
      }

      function updateUnread() {
        if (state.unread > 0 && !state.open) {
          elements.unread.textContent = state.unread > 9 ? '9+' : String(state.unread);
          elements.unread.style.display = 'flex';
        } else {
          elements.unread.style.display = 'none';
        }
      }

      function setOpen(open) {
        state.open = open;
        elements.panel.hidden = !open;
        updateToggle();
        if (open) {
          state.unread = 0;
          updateUnread();
          setTimeout(() => elements.input.focus(), 120);
        }
      }

      function setLoading(loading) {
        state.loading = loading;
        elements.send.disabled = loading || !elements.input.value.trim();
      }

      function createBubble(message) {
        const bubble = document.createElement('div');
        bubble.className = 'chat-bubble';
        bubble.style.alignItems = message.role === 'user' ? 'flex-end' : 'flex-start';

        const inner = document.createElement('div');
        inner.className = 'chat-bubble-inner';

        const body = document.createElement('div');
        body.className = 'chat-bubble-body';
        body.textContent = message.content;

        if (message.role === 'user') {
          body.classList.add('user');
        } else if (message.error) {
          body.classList.add('error');
        } else {
          body.classList.add('assistant');
        }

        const copyBtn = document.createElement('button');
        copyBtn.className = 'chat-bubble-copy';
        copyBtn.type = 'button';
        copyBtn.title = 'Copy';
        copyBtn.setAttribute('aria-label', 'Copy message');
        copyBtn.textContent = '⎘';
        copyBtn.style[message.role === 'user' ? 'left' : 'right'] = '-8px';

        copyBtn.addEventListener('click', async () => {
          try {
            await navigator.clipboard.writeText(message.content);
            copyBtn.textContent = '✓';
            copyBtn.classList.add('copied');
            setTimeout(() => {
              copyBtn.textContent = '⎘';
              copyBtn.classList.remove('copied');
            }, 1800);
          } catch {
            // Clipboard unavailable.
          }
        });

        inner.appendChild(body);
        inner.appendChild(copyBtn);

        const meta = document.createElement('span');
        meta.className = 'chat-bubble-meta';
        meta.textContent = formatTime(message.time);

        bubble.appendChild(inner);
        bubble.appendChild(meta);
        return bubble;
      }

      function renderMessages() {
        elements.messages.innerHTML = '';
        state.messages.forEach((message) => elements.messages.appendChild(createBubble(message)));
        if (state.loading) {
          const typing = document.createElement('div');
          typing.className = 'chat-typing';
          typing.innerHTML = '<span></span><span></span><span></span>';
          elements.messages.appendChild(typing);
        }
        scrollToBottom();
      }

      function renderQuickActions() {
        if (state.messages.length <= 2) {
          elements.quick.classList.add('visible');
          elements.quick.innerHTML = '';
          QUICK_ACTIONS.forEach((action) => {
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'chat-chip';
            btn.textContent = `${action.icon} ${action.label}`;
            btn.addEventListener('click', () => sendMessage(btn.textContent));
            elements.quick.appendChild(btn);
          });
        } else {
          elements.quick.classList.remove('visible');
          elements.quick.innerHTML = '';
        }
      }

      function addMessage(message) {
        state.messages.push(message);
        renderMessages();
        renderQuickActions();
      }

      function getCurrentUserId() {
        return window.getCurrentUser?.()?.ID ?? null;
      }

      async function sendToAI(message, history) {
        const endpoint = window.AI_CHAT_ENDPOINT;
        if (endpoint) {
          const response = await fetch(endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              message,
              history,
              booking_state: state.bookingState,
              user_id: getCurrentUserId()
            })
          });

          if (!response.ok) {
            throw new Error('AI request failed');
          }

          return response.json();
        }

        await new Promise((resolve) => setTimeout(resolve, 850));
        return {
          reply: `I heard: "${message}"\nTry wiring window.AI_CHAT_ENDPOINT to your API.`,
          booking_state: state.bookingState
        };
      }

      async function sendMessage(text) {
        const value = (text ?? elements.input.value).trim();
        if (!value || state.loading) return;

        elements.input.value = '';
        setLoading(true);

        addMessage({ role: 'user', content: value, time: new Date() });

        const history = state.messages.map((msg) => ({ role: msg.role, content: msg.content }));

        try {
          const response = await sendToAI(value, history);
          const reply =
            response?.reply ||
            response?.response?.message ||
            response?.response ||
            'Sorry, I could not process that.';
          const trigger = response?.trigger;

          if (response?.booking_state) {
            state.bookingState = response.booking_state;
          }

          if (trigger === 'booking_complete' || trigger === 'cancelled') {
            state.bookingState = null;
          }

          const content = typeof reply === 'string' ? reply : JSON.stringify(reply, null, 2);
          addMessage({ role: 'assistant', content, time: new Date() });
          if (!state.open) {
            state.unread += 1;
            updateUnread();
          }
        } catch {
          addMessage({
            role: 'assistant',
            content: 'Connection issue. Please try again.',
            time: new Date(),
            error: true
          });
        } finally {
          setLoading(false);
        }
      }

      function resetChat() {
        state.messages = [INITIAL_MESSAGE];
        state.bookingState = null;
        renderMessages();
        renderQuickActions();
      }

      function autoResize() {
        elements.input.style.height = 'auto';
        elements.input.style.height = `${Math.min(elements.input.scrollHeight, 90)}px`;
      }

      function wireEvents() {
        elements.toggle.addEventListener('click', () => setOpen(!state.open));
        elements.clear.addEventListener('click', resetChat);
        elements.form.addEventListener('submit', (event) => {
          event.preventDefault();
          sendMessage();
        });
        elements.input.addEventListener('input', () => {
          setLoading(false);
          autoResize();
        });
        elements.input.addEventListener('keydown', (event) => {
          if (event.key === 'Enter' && !event.shiftKey) {
            event.preventDefault();
            sendMessage();
          }
        });

        window.addEventListener('keydown', (event) => {
          if (event.ctrlKey && event.key === '/') {
            event.preventDefault();
            setOpen(!state.open);
          }
        });
      }

      renderMessages();
      renderQuickActions();
      updateToggle();
      updateUnread();
      wireEvents();
    </script>
  </body>
</html>
